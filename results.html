<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Results — e-Safe | Cissy Technologies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-thin-rounded/css/uicons-thin-rounded.css">
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-thin-straight/css/uicons-thin-straight.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="results-body">

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 28 28" fill="none">
            <path d="M14 2L4 7V14C4 19.5 8.4 24.7 14 26C19.6 24.7 24 19.5 24 14V7L14 2Z" stroke="#1A2744" stroke-width="2" stroke-linejoin="round"/>
            <path d="M10 14L13 17L18 11" stroke="#1A2744" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div style="font-size:16px;font-weight:700;color:#1A2744;line-height:1.1">e-Safe</div>
          <div style="font-size:11px;color:#9CA3AF;line-height:1">by Cissy Technologies</div>
        </div>
      </a>
      <div class="nav-links">
        <div class="user-avatar" id="userAvatar">JS</div>
      </div>
    </div>
  </nav>

  <main class="results-main">
    <div class="results-container">

      <!-- SCORE HERO -->
      <div class="results-hero" id="resultsHero">
        <div class="results-hero-icon" id="resultsHeroIcon">
          <i class="fi fi-tr-trophy-star" id="resultsIcon"></i>
        </div>
        <h1 class="results-headline" id="resultsHeadline">You passed!</h1>
        <div class="results-score" id="resultsScore">0%</div>
        <div class="results-score-sub" id="resultsScoreSub">0 of 50 correct</div>
      </div>

      <!-- SCORE BREAKDOWN BY THEME -->
      <div class="dash-card results-breakdown">
        <h2 class="results-breakdown-title">Score by theme</h2>
        <div id="themeBreakdown"><!-- injected by JS --></div>
      </div>

      <!-- WEAK TOPICS (fail only) -->
      <div class="dash-card results-weak" id="weakTopicsCard" style="display:none">
        <div class="weak-header">
          <i class="fi fi-tr-triangle-warning"></i>
          <h3>Review these topics first</h3>
        </div>
        <div id="weakTopicsList"><!-- injected by JS --></div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="results-actions" id="resultsActions">
        <!-- injected by JS depending on pass/fail -->
      </div>

      <!-- ENCOURAGEMENT (fail only) -->
      <p class="results-encouragement" id="resultsEncouragement" style="display:none">
        You can retake the quiz as many times as you need. Review the topics above and you will get there.
      </p>

    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
