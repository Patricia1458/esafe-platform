<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Module — e-Safe | Cissy Technologies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-thin-rounded/css/uicons-thin-rounded.css">
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-thin-straight/css/uicons-thin-straight.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="module-body">

  <!-- ── NAVBAR ── -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 28 28" fill="none">
            <path d="M14 2L4 7V14C4 19.5 8.4 24.7 14 26C19.6 24.7 24 19.5 24 14V7L14 2Z" stroke="#1A2744" stroke-width="2" stroke-linejoin="round"/>
            <path d="M10 14L13 17L18 11" stroke="#1A2744" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div style="font-size:16px;font-weight:700;color:#1A2744;line-height:1.1">e-Safe</div>
          <div style="font-size:11px;color:#9CA3AF;line-height:1">by Cissy Technologies</div>
        </div>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="dashboard.html" class="nav-link">My Progress</a>
        <a href="#" class="nav-link">Resources</a>
        <div class="user-avatar" id="userAvatar">JS</div>
      </div>
    </div>
  </nav>

  <main class="module-main">
    <div class="module-container">

      <!-- HEADER CARD -->
      <div class="dash-card module-header-card">
        <a href="dashboard.html" class="back-arrow" aria-label="Back to dashboard">
          <i class="fi fi-tr-arrow-left"></i>
        </a>
        <div class="module-header-top">
          <h1 class="module-title" id="moduleTitle">Loading module...</h1>
          <span class="module-badge" id="moduleBadge">Module 1 of 20</span>
        </div>
        <div class="progress-label-row">
          <span class="progress-label">Module Progress</span>
          <span class="progress-pct" id="modProgressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="modProgressFill" style="width:0%"></div>
        </div>
      </div>

      <!-- CHARACTER CARD -->
      <div class="dash-card character-card">
        <div class="character-avatar" id="charAvatar">SM</div>
        <div>
          <div class="character-name" id="charName">Character Name</div>
          <div class="character-role" id="charRole">Role</div>
        </div>
      </div>

      <!-- DIALOGUE CARD -->
      <div class="dash-card dialogue-card">
        <p id="dialogueText">"Dialogue goes here..."</p>
      </div>

      <!-- SCENARIO CARD -->
      <div class="dash-card scenario-card">
        <span class="scenario-tag">Scenario</span>
        <h2 class="scenario-title" id="scenarioTitle">Scenario title</h2>
        <div id="scenarioBody"><!-- paragraphs injected here --></div>
      </div>

      <!-- KEY LESSON CARD -->
      <div class="key-lesson-card">
        <div class="key-lesson-icon">
          <i class="fi fi-tr-lightbulb-on"></i>
        </div>
        <div>
          <div class="key-lesson-heading">Key Lesson</div>
          <p id="keyLessonText">Key lesson text goes here.</p>
        </div>
      </div>

      <!-- ACTION STEPS CARD -->
      <div class="dash-card action-steps-card">
        <h3 id="actionStepsHeading">What should you do:</h3>
        <ol class="action-steps-list" id="actionStepsList">
          <!-- steps injected here -->
        </ol>
      </div>

      <!-- CONTINUE BUTTON -->
      <button class="btn-primary module-continue-btn" id="moduleContinueBtn">Continue</button>

    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
